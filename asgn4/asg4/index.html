<html>
    <head>
        <meta charset="utf-8">
        <title>ASG 4</title>

        <!-- Load external libs -->
        <script src="lib/cuon-matrix-cse160.js"></script>
        <script src="lib/cuon-utils.js"></script>
        <script src="lib/webgl-debug.js"></script>
        <script src="lib/webgl-utils.js"></script>

        <!-- Load internal libs -->
        <script src="camera.js"></script>
        <script src="models/triangle.js"></script>
        <script src="models/cube.js"></script>
        <script src="models/sphere.js"></script>

        <!-- Load main -->
        <script src="asg4.js"></script>
    </head>

    <body onload="main()">
        <canvas id="webgl" width="400" height="400">
        Please use a browser that supports "canvas"
        </canvas>
        <p>
        <p id="numdot"> XXX </p> 
        <button type="button" id="normalOn">Normal On</button>
        <button type="button" id="normalOff">Normal Off</button>
        Light:
        <button type="button" id="lightOn">ON</button>
        <button type="button" id="lightOff">OFF</button>

        </br>
        Light X <input type="range" min="-250" max="250" value="0" class="slider" id="lightSlideX">
        Light Y <input type="range" min="-250" max="250" value="100" class="slider" id="lightSlideY">
        Light Z <input type="range" min="-250" max="250" value="-200" class="slider" id="lightSlideZ">
        <br>
        
        Leg Animation: 
        <br>
        <button type="button" id="animationLegsOnButton">ON</button>
        <button type="button" id="animationLegsOffButton">OFF</button>
        <br>



        <div>
        Shapes: 
        <br>
        Head <input type="range" min="0" max="100" value="75" class="slider" id="HeadSlide">
        <br>
        Head Animation: 
        <br>
            <button type="button" id="animationHeadOnButton">ON</button>
            <button type="button" id="animationHeadOffButton">OFF</button>
        <br>

        Body <input type="range" min="0" max="100" value="50" class="slider" id="BodySlide"></br></br>

        Legs <input type="range" min="0" max="100" value="35" class="slider" id="LegsSlide"></br></br>
        
        Camera Angle: <input type="range" min="0" max="90" value="45" class="slider" id="angleSlide">
        </canvas>
    </body>
    </html>
